format:
  revealjs:
    # Path relativi al .qmd che include questo file di metadata
    # (es. presentazione/slides.qmd → ../brand/...)
    theme: [default, ../brand/CRP-revealjs.scss]
    logo: ../brand/logo.jpg
    footer: "Fondazione Cariparma - Osservatorio Dati Sociali | {{< meta date >}}"
    slide-number: true
    show-slide-number: all
    transition: fade
    background-transition: fade
    self-contained: true
